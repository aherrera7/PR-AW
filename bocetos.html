    <figure>
    <img src="img/Bocetos/Bcto1_Inicio.png" alt="Boceto de la página de inicio" width="500">
    <figcaption>
        Descripción: En esta página se muestra la interfaz de la pantalla de inicio, donde se puede pedir en el local o para llevar
        El usuario accede a esta pantalla si accede por primera vez, o pulsa el botón de la barra de navegación de inicio.

        Para iniciar sesión o registrarse, el usuario/trabajador, tiene que pulsar el botón de la esquina superior izquierda (Login/Register) 
        que lo redirige a la siguiente página (Boceto 2). 
        Este boceto puede ser utilizado por cualquier tipo de usuario y está diseñado 
        para ser intuitivo y fácil de usar.
    </figcaption>
    </figure>

    <figure>
    <img src="img/Bocetos/Bcto2_Login-Reg.png" alt="Boceto de Login/register" width="500">
    <figcaption>
        Descripción: En esta página el usuario puede iniciar sesión o registrarse, dependiendo del botón que pulse.
        Este boceto número 2 representa el inicio de sesión, si pulsamos el de Registrarse, se observaría la pantalla reflejada en el (Boceto 3)
 
        Este boceto puede ser utilizado por cualquier tipo de usuario, por defecto todos los nuevos usarios tienen rol cliente.
    </figcaption>
    </figure>

    <figure>
    <img src="img/Bocetos/Bcto3_Register.png" alt="Boceto de register" width="500">
        Descripción: En esta página el usuario puede registrarse, rellenando toda la información necesaria.
        Si le da al botón de acceder, el usuario quedará registrado, y pasaremos a ver la nueva pantalla de nuestro perfil (Boceto 4).
 
        Este boceto puede ser utilizado por cualquier tipo de usuario.
    </figure>

    <figure>
    <img src="img/Bocetos/Bcto4_Perfil.png" alt="Boceto del perfil del usuario" width="500">
    <figcaption>
        Descripción: En esta página se muestra la información de nuestro perfil, pudiendo modificar todos los campos
        que aparecen en el boceto, menos cambiar el rol (responsabilidad del gerente) y las bistrocoins que son automáticas.

        Para poder acceder a esta página también pueden pulsar el botón superior derecho de "Mi Perfil".
        Este boceto puede ser utilizado por cualquier tipo de usuario.
    </figcaption>
    </figure>

    <figure>
    <img src="img/Bocetos/Bcto5_Producto.png" alt="Boceto del producto" width="500">
    <figcaption>
        Descripción: En esta página vemos la vista del gerente, al pulsar en un producto, viendo además de la descripción, categoría, precio, IVA, disponibilidad
        botones de aplicar oferta y ordenar reposicion que solo pueden visualizar los gerentes. Mientras que el resto de usuarios pueden ver los campos anteriores.
        Este boceto solo puede ser utilizado por el gerente.
    </figcaption>
    </figure>
